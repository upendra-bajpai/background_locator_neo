name: background_locator_neo
description: A Flutter plugin to request the location even if the app is killed. Sending the location to a dart function in background, also provide a meter filter
version: 3.0.0
homepage: https://github.com/upendra-bajpai/background_locator_neo
issue_tracker: https://github.com/upendra-bajpai/background_locator_neo/issues
platforms:
  android:
  ios:


environment:
  sdk: ">=2.12.0 <4.0.0"
  flutter: ">=1.12.0"
dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: upendra.bajpai.background_locator_neo
        pluginClass: BackgroundLocatorPlugin
      ios:
        pluginClass: BackgroundLocatorPlugin

